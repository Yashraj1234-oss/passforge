<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <!-- Header -->
    <header class="header">
      <div class="header-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1 class="header-title">PassForge</h1>
      <p class="header-sub">Generate secure passwords instantly</p>
    </header>

    <!-- Card -->
    <section class="card" role="main" aria-label="Password generator">

      <!-- Password Output -->
      <div class="output-area">
        <span class="output-label">Generated password</span>
        <div class="output-row">
          <code id="password-display" class="password-text" aria-live="polite" aria-atomic="true">
            Click generate →
          </code>
          <button
            id="copy-btn"
            class="copy-btn"
            aria-label="Copy password to clipboard"
            title="Copy"
            disabled
          >
            <!-- Copy icon -->
            <svg id="copy-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <!-- Check icon (hidden by default) -->
            <svg id="check-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </button>
        </div>
        <span id="copy-feedback" class="copy-feedback hidden" aria-live="polite">Copied!</span>
      </div>

      <!-- Strength Meter -->
      <div class="strength-area" aria-label="Password strength">
        <span class="strength-label">Strength</span>
        <div class="strength-bars" role="img" aria-label="Strength indicator">
          <div class="bar" data-bar="1"></div>
          <div class="bar" data-bar="2"></div>
          <div class="bar" data-bar="3"></div>
          <div class="bar" data-bar="4"></div>
        </div>
        <span id="strength-text" class="strength-text">—</span>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- Length Slider -->
      <div class="control-group">
        <div class="control-header">
          <label for="length-slider" class="control-label">Length</label>
          <span id="length-value" class="control-value">16</span>
        </div>
        <input
          type="range"
          id="length-slider"
          class="slider"
          min="4"
          max="64"
          value="16"
          aria-valuemin="4"
          aria-valuemax="64"
          aria-valuenow="16"
        />
        <div class="slider-ticks" aria-hidden="true">
          <span>4</span>
          <span>16</span>
          <span>32</span>
          <span>48</span>
          <span>64</span>
        </div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- Character Type Toggles -->
      <fieldset class="toggles-group">
        <legend class="control-label">Character types</legend>

        <label class="toggle-item">
          <input type="checkbox" id="opt-upper" class="toggle-cb" checked />
          <span class="toggle-track" aria-hidden="true"></span>
          <span class="toggle-info">
            <span class="toggle-name">Uppercase</span>
            <span class="toggle-chars">A – Z</span>
          </span>
        </label>

        <label class="toggle-item">
          <input type="checkbox" id="opt-lower" class="toggle-cb" checked />
          <span class="toggle-track" aria-hidden="true"></span>
          <span class="toggle-info">
            <span class="toggle-name">Lowercase</span>
            <span class="toggle-chars">a – z</span>
          </span>
        </label>

        <label class="toggle-item">
          <input type="checkbox" id="opt-numbers" class="toggle-cb" checked />
          <span class="toggle-track" aria-hidden="true"></span>
          <span class="toggle-info">
            <span class="toggle-name">Numbers</span>
            <span class="toggle-chars">0 – 9</span>
          </span>
        </label>

        <label class="toggle-item">
          <input type="checkbox" id="opt-special" class="toggle-cb" />
          <span class="toggle-track" aria-hidden="true"></span>
          <span class="toggle-info">
            <span class="toggle-name">Special</span>
            <span class="toggle-chars">!@#$%^&amp;*</span>
          </span>
        </label>

      </fieldset>

      <!-- Validation Error -->
      <p id="error-msg" class="error-msg hidden" role="alert">
        Select at least one character type.
      </p>

      <!-- Generate Button -->
      <button id="generate-btn" class="generate-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
        </svg>
        Generate password
      </button>

    </section>

    <footer class="footer">
      Passwords are generated client-side and never leave your device.
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
